server:
  port: 8082
  servlet:
    context-path: /

spring:
  application:
    name: auth-service
  
  datasource:
    url: jdbc:mysql://${DB_HOST}:${DB_PORT}/ecommerce_auth_db?useSSL=false&serverTimezone=UTC&createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: ${DB_DIALECT}
        format_sql: true
        use_sql_comments: true
    show-sql: false
    open-in-view: false
  
  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: America/Sao_Paulo
  
  flyway:
    enabled: true
    locations: classpath:db/migration
    validate-on-migrate: true
    fail-on-missing-locations: true
    baseline-on-migrate: true
    baseline-version: 0

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE}
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 30
    lease-expiration-duration-in-seconds: 90

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION}
  refresh:
    expiration: ${JWT_REFRESH_EXPIRATION}

logging:
  level:
    root: ${LOG_LEVEL_ROOT}
    com.ecommerce: ${LOG_LEVEL_APP}
    org.springframework.security: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

---
spring:
  config:
    activate:
      on-profile: production

logging:
  level:
    root: WARN
    com.ecommerce: INFO
    org.springframework.security: WARN
