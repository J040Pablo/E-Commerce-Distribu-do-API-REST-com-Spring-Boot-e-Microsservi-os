server:
  port: 8082
  servlet:
    context-path: /

spring:
  application:
    name: auth-service
  
  # Configuração de Datasource MySQL
  datasource:
    url: jdbc:mysql://127.0.0.1:3307/ecommerce_auth_db?useSSL=false&serverTimezone=UTC&createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true
    username: root
    password: ecommerce
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  # Configuração JPA/Hibernate
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
        use_sql_comments: true
    show-sql: false
    open-in-view: false
  
  # Configuração de serialização
  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: America/Sao_Paulo

# Configuração Eureka
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 30
    lease-expiration-duration-in-seconds: 90

# Configuração JWT
jwt:
  secret: ecommerce_secret_key_very_long_for_hs512_algorithm_please_change_in_production
  expiration: 86400000  # 24 horas em milisegundos
  refresh:
    expiration: 604800000  # 7 dias em milisegundos

# Configuração de Logging
logging:
  level:
    root: INFO
    com.ecommerce: DEBUG
    org.springframework.security: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
