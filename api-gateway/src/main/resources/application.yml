# ========================================
# Spring Boot Server Configuration
# ========================================
server:
  port: 8080

# ========================================
# Spring Cloud Gateway Configuration
# ========================================
spring:
  application:
    # Nome do serviço registrado no Eureka
    name: api-gateway

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  cloud:
    gateway:
      # Rotas explícitas para serviços descobertos no Eureka
      routes:
        # Rota para Auth Service
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/api/auth/**
          filters:
            - StripPrefix=0
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@gatewayRateLimitKeyResolver}"
                "[redis-rate-limiter.replenishRate]": ${RATE_LIMIT_AUTH_REPLENISH_RATE:20}
                "[redis-rate-limiter.burstCapacity]": ${RATE_LIMIT_AUTH_BURST_CAPACITY:40}
                "[redis-rate-limiter.requestedTokens]": 1
        
        # Rota para Product Service
        - id: product-service
          uri: lb://product-service
          predicates:
            - Path=/api/products/**
          filters:
            - StripPrefix=0
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@gatewayRateLimitKeyResolver}"
                "[redis-rate-limiter.replenishRate]": ${RATE_LIMIT_USER_REPLENISH_RATE:100}
                "[redis-rate-limiter.burstCapacity]": ${RATE_LIMIT_USER_BURST_CAPACITY:100}
                "[redis-rate-limiter.requestedTokens]": ${RATE_LIMIT_USER_REQUESTED_TOKENS:1}

        # Rota para Customer Service
        - id: customer-service
          uri: lb://customer-service
          predicates:
            - Path=/api/customers/**
          filters:
            - StripPrefix=0
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@gatewayRateLimitKeyResolver}"
                "[redis-rate-limiter.replenishRate]": ${RATE_LIMIT_USER_REPLENISH_RATE:100}
                "[redis-rate-limiter.burstCapacity]": ${RATE_LIMIT_USER_BURST_CAPACITY:100}
                "[redis-rate-limiter.requestedTokens]": ${RATE_LIMIT_USER_REQUESTED_TOKENS:1}

        # Rota para Order Service
        - id: order-service
          uri: lb://order-service
          predicates:
            - Path=/api/orders/**
          filters:
            - StripPrefix=0
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@gatewayRateLimitKeyResolver}"
                "[redis-rate-limiter.replenishRate]": ${RATE_LIMIT_USER_REPLENISH_RATE:100}
                "[redis-rate-limiter.burstCapacity]": ${RATE_LIMIT_USER_BURST_CAPACITY:100}
                "[redis-rate-limiter.requestedTokens]": ${RATE_LIMIT_USER_REQUESTED_TOKENS:1}

        # Rota para Payment Service
        - id: payment-service
          uri: lb://payment-service
          predicates:
            - Path=/api/payments/**
          filters:
            - StripPrefix=0
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@gatewayRateLimitKeyResolver}"
                "[redis-rate-limiter.replenishRate]": ${RATE_LIMIT_USER_REPLENISH_RATE:100}
                "[redis-rate-limiter.burstCapacity]": ${RATE_LIMIT_USER_BURST_CAPACITY:100}
                "[redis-rate-limiter.requestedTokens]": ${RATE_LIMIT_USER_REQUESTED_TOKENS:1}
    
    loadbalancer:
      # Ribbon LoadBalancer (usado com Eureka)
      ribbon:
        enabled: true
      # Configuração de cache e descoberta
      cache:
        ttl: 5m
      # Usar Eureka como service provider
      eureka:
        enabled: true
      # Health check
      health-check:
        initial-delay: 0
        interval: 25s

# ========================================
# Eureka Client Configuration
# ========================================
eureka:
  client:
    # Configuração do Eureka Server
    service-url:
      # URL do Eureka Server para registrar o API Gateway
      defaultZone: http://localhost:8761/eureka
    
    # Registra o API Gateway no Eureka como cliente
    register-with-eureka: true
    
    # Busca a lista de serviços no Eureka
    fetch-registry: true

  instance:
    # Define a preferência para usar o hostname ao invés do IP
    # IMPORTANTE: Deve ser true para que o LoadBalancer encontre o serviço
    prefer-ip-address: true
    
    # Intervalo de heartbeat (em segundos)
    lease-renewal-interval-in-seconds: 10
    
    # Timeout antes de remover o serviço (em segundos)
    lease-expiration-duration-in-seconds: 30

# ========================================
# Logging Configuration
# ========================================
logging:
  level:
    "[org.springframework.cloud.gateway]": DEBUG
    "[org.springframework.cloud.gateway.filter.ratelimit]": INFO
    "[org.springframework.cloud.loadbalancer]": DEBUG
    "[com.netflix.discovery]": INFO
    "[org.springframework.web]": DEBUG
